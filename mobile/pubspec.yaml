name: jarvis_mobile
description: J.A.R.V.I.S. mobile companion — remote control + dashboard for the PC voice assistant.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.5.1
  flutter_markdown: ^0.7.4
  # Phase 2 — voice
  record: ^5.1.2
  just_audio: ^0.9.40
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  # Phase 3 — push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3
  # Phase 4 — standalone (lite) mode: scheduled local reminders
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
