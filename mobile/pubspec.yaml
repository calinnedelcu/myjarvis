name: jarvis_mobile
description: J.A.R.V.I.S. mobile companion — remote control + dashboard for the PC voice assistant.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

# NOTE: voice (record, just_audio) and Firebase (firebase_*) packages are
# stripped from this demo build to keep the cloud APK build green. The full
# pipeline (Phase 2 voice, Phase 3 push) requires those plugins; restore
# them and run `flutter pub get` once you're back on the dev machine.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  flutter_riverpod: ^2.5.1
  flutter_markdown: ^0.7.4
  permission_handler: ^11.3.1
  # Phase 4 — standalone (lite) mode: scheduled local reminders
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
